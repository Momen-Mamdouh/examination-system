<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link rel="icon" type="image/x-icon" href="../assets/images/favicon.ico">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.7.2/css/all.min.css"
        integrity="sha512-Evv84Mr4kqVGRNSgIGL/F/aIDqQb7xQ2vcrdIwxfjThSH8CSR7PBEakCr51Ck+w+/U6swU2Im1vVX0SVk9ABhg=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <link rel="stylesheet" href="../styles/pages/auth.css">
</head>

<body class="background-div form-bg">

    <main class="auth-main">
        <section class="auth">

            <div class="auth-card main-card-box-shadow ">
                <div class="card-header ">Register</div>
                <form class="auth-form">

                    <div class="input-area">

                        <div class="input-div">
                            <input class="main-input" type="text" name="fullname" placeholder="Full Name" id="fullname"
                                pattern="^[a-zA-Z\s]{3,}$" />
                            <i class="fa-regular fa-user"></i>

                        </div>
                        <span class="fullname-warning"
                            data-err-message="Name must be at least 3 letters (no numbers)"></span>


                        <div class="input-div">
                            <input class="main-input" type="email" name="email" placeholder="Email" id="email"
                                pattern="^[^\\s@]+@[^\\s@]+\.[^\\s@]+$" />
                            <i class="fa-solid fa-at"></i>

                        </div>
                        <span class="email-warning" data-err-message="Please enter a valid email address"></span>


                        <div class="input-div">
                            <input class="main-input" type="password" name="password" placeholder="Password"
                                id="password" pattern="^(?=.*[A-Za-z])(?=.*\d).{8,}$" />
                            <i class="fa-regular fa-eye"></i>
                            <i class="fa-solid fa-lock"></i>

                        </div>
                        <span class="password-warning" data-err-message="Password must be 8+ chars, with at least 1 letter & 1
                            number"></span>


                        <div class="input-div">
                            <input class="main-input" type="password" name="confirm-password"
                                placeholder="Confirm Password" id="confirm-password"
                                pattern="^(?=.*[A-Za-z])(?=.*\d).{8,}$" />
                            <i class="fa-regular fa-eye"></i>
                            <i class="fa-solid fa-lock"></i>

                        </div>
                        <span class="confirm-password-warning" data-err-message="Passwords do not match"></span>

                    </div>

                    <div class="submit-area">
                        <button type="submit" class="main-btn">Register</button>
                        <aside class="login">
                            <div>Already have an account? <a class="main-link" href="./login.html">Login</a> </div>
                        </aside>
                    </div>

                </form>


            </div>
            <div class="card-img">
                <img src="../assets/images/register-form-img.png" alt="register">
            </div>

        </section>


    </main>


    <div id="toast">
        <div id="img">
            <i class="fa-regular fa-circle-check"></i>
            <i class="fa-regular fa-circle-xmark"></i>
        </div>
        <p id="desc">A notification message..</p>
    </div>


    <script src="../src/pages/register.js"></script>

</body>

</html>
